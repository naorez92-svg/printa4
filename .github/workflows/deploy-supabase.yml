name: Deploy Supabase (migrations + Edge Function)

on:
  push:
    paths:
      - 'beshvili/supabase/functions/**'
  workflow_dispatch:

jobs:
  edge-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest
          # Authenticate the "resolve latest CLI release" GitHub API call. Without a
          # token it uses the 60/hour unauthenticated limit shared across runners and
          # fails with "rate limit exceeded" — which silently blocked every Edge
          # Function deploy (functions went stale). GITHUB_TOKEN is auto-provided.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy generate-booklet --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy generate-jewish --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy admin-stats --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy send-followup --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy send-renewal-reminder --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy view-booklet --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy notify-lead --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy health-check --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy selftest-booklet --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy unsubscribe --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy admin-unsubscribe --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy send-followup-emails --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
          supabase functions deploy record-survey-answer --project-ref gywpdzkvkdisonuzhsib --no-verify-jwt
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set secrets
        run: |
          supabase secrets set ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY2 }}" \
            --project-ref gywpdzkvkdisonuzhsib
          supabase secrets set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            --project-ref gywpdzkvkdisonuzhsib
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Diagnostic — test function reachability
        run: |
          echo "=== Test 1: no Origin (server-like) ==="
          S1=$(curl -s -o /tmp/body1.txt -w "%{http_code}" \
            -X POST "https://gywpdzkvkdisonuzhsib.supabase.co/functions/v1/generate-booklet" \
            -H "Content-Type: application/json" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5d3Bkemt2a2Rpc29udXpoc2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDM2NzgsImV4cCI6MjA5NzY3OTY3OH0.UL4wV5dO1a-idiaLy-X0tX7kYVEr-ilUwmQb3W9Y8Mw" \
            -d '{"test":true}')
          echo "Status: $S1  Body: $(cat /tmp/body1.txt)"

          echo "=== Test 2: with Origin header (browser-like) ==="
          S2=$(curl -s -o /tmp/body2.txt -w "%{http_code}" \
            -X POST "https://gywpdzkvkdisonuzhsib.supabase.co/functions/v1/generate-booklet" \
            -H "Content-Type: application/json" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5d3Bkemt2a2Rpc29udXpoc2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDM2NzgsImV4cCI6MjA5NzY3OTY3OH0.UL4wV5dO1a-idiaLy-X0tX7kYVEr-ilUwmQb3W9Y8Mw" \
            -H "Origin: https://beshvili.vercel.app" \
            -d '{"test":true}')
          echo "Status: $S2  Body: $(cat /tmp/body2.txt)"

          echo "=== Test 3: with Origin + Authorization (full browser simulation) ==="
          S3=$(curl -s -o /tmp/body3.txt -w "%{http_code}" \
            -X POST "https://gywpdzkvkdisonuzhsib.supabase.co/functions/v1/generate-booklet" \
            -H "Content-Type: application/json" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5d3Bkemt2a2Rpc29udXpoc2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDM2NzgsImV4cCI6MjA5NzY3OTY3OH0.UL4wV5dO1a-idiaLy-X0tX7kYVEr-ilUwmQb3W9Y8Mw" \
            -H "Origin: https://beshvili.vercel.app" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5d3Bkemt2a2Rpc29udXpoc2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDM2NzgsImV4cCI6MjA5NzY3OTY3OH0.UL4wV5dO1a-idiaLy-X0tX7kYVEr-ilUwmQb3W9Y8Mw" \
            -d '{"test":true}')
          echo "Status: $S3  Body: $(cat /tmp/body3.txt)"

      - name: Done
        run: echo "✅ Edge Function deployed!"

  migrations:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest
          # Authenticate the "resolve latest CLI release" GitHub API call. Without a
          # token it uses the 60/hour unauthenticated limit shared across runners and
          # fails with "rate limit exceeded" — which silently blocked every Edge
          # Function deploy (functions went stale). GITHUB_TOKEN is auto-provided.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Link project
        run: supabase link --project-ref gywpdzkvkdisonuzhsib
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB migrations
        run: supabase db push --include-all
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Done
        run: echo "✅ Migrations applied!"
