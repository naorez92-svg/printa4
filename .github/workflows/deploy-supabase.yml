name: Deploy Supabase (migrations + Edge Function)

on:
  push:
    paths:
      - 'beshvili/supabase/functions/**'
  workflow_dispatch:

jobs:
  edge-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy generate-booklet --project-ref gywpdzkvkdisonuzhsib
          supabase functions deploy admin-stats --project-ref gywpdzkvkdisonuzhsib
          supabase functions deploy send-followup --project-ref gywpdzkvkdisonuzhsib
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set secrets
        run: |
          supabase secrets set ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --project-ref gywpdzkvkdisonuzhsib
          supabase secrets set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            --project-ref gywpdzkvkdisonuzhsib
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Done
        run: echo "✅ Edge Function deployed!"

  migrations:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref gywpdzkvkdisonuzhsib
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB migrations
        run: supabase db push --include-all
        working-directory: beshvili
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Done
        run: echo "✅ Migrations applied!"
