name: Daily Stats Report

on:
  schedule:
    - cron: '0 5 * * *'  # 8:00 Israel time (UTC+3)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    # The report step creates issues; the default read-only GITHUB_TOKEN gets
    # 403 "Resource not accessible by integration" (same fix as health-check).
    permissions:
      issues: write
    steps:
      - name: Fetch stats from admin-stats Edge Function
        id: stats
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://gywpdzkvkdisonuzhsib.supabase.co/functions/v1/admin-stats" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"generateProposals":true}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          # Hand the body to the next step via a FILE, not a step output/env var:
          # the repo is public and actions/github-script echoes its env block
          # into the (public) run log — which was printing every customer email
          # in recentUsers/recentLeads for anyone to read.
          echo "$RESPONSE" | head -n -1 > /tmp/stats.json
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "Fetched stats: HTTP $HTTP_CODE ($(wc -c < /tmp/stats.json) bytes)"

      - name: Create daily report issue
        uses: actions/github-script@v7
        env:
          HTTP_CODE: ${{ steps.stats.outputs.http_code }}
        with:
          script: |
            let raw = '{}';
            try { raw = require('fs').readFileSync('/tmp/stats.json', 'utf8'); } catch {}
            const httpCode = process.env.HTTP_CODE;
            let s = {};
            try { s = JSON.parse(raw); } catch {}

            const now = new Date();
            const dateStr = now.toLocaleDateString('he-IL', { timeZone: 'Asia/Jerusalem' });
            const timeStr = now.toLocaleTimeString('he-IL', { timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit' });

            if (httpCode !== '200' || s.error) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ דוח יומי נכשל — ${dateStr}`,
                body: `## שגיאה בדוח היומי\n\n- HTTP: ${httpCode}\n- שגיאה: ${s.error || raw.substring(0, 200)}\n\nבדוק את Edge Function admin-stats.`,
                labels: ['daily-report', 'bug'],
              });
              return;
            }

            const planMap = {
              free: 'חינם',
              pro: 'פרו',
              parent: 'הורה',
              teacher: 'מורה',
              admin: 'אדמין',
            };
            const planLines = Object.entries(s.planBreakdown || {})
              .map(([p, n]) => `| ${planMap[p] || p} | ${n} |`)
              .join('\n');

            const topicLines = (s.topTopics || []).slice(0, 5)
              .map((t, i) => `${i + 1}. ${t.topic} (${t.count})`)
              .join('\n');

            const feedbackLines = (s.recentFeedback || []).slice(0, 5)
              .map(f => `- ${f.message.substring(0, 80)}`)
              .join('\n') || '_אין פידבק חדש_';

            // Issues in a public repo are public — mask the phone so customer
            // PII isn't published. Full details live in the admin panel.
            const leadLines = (s.recentLeads || []).slice(0, 5)
              .map(l => `- ${l.name || 'ללא שם'} · ${l.phone ? '···' + String(l.phone).slice(-3) : '—'}`)
              .join('\n') || '_אין לידים חדשים_';

            // Business funnel (7-day windows from admin-stats)
            const an = s.analytics ?? {};
            const fs = s.funnelStats ?? {};
            const pct = (a, b) => (b > 0 ? Math.round((a / b) * 100) + '%' : '—');
            const sourceLines = (an.sources ?? []).slice(0, 6)
              .map(x => `| ${x.source || 'ישיר'} | ${x.count} |`).join('\n') || '_אין נתונים_';
            // Verdict: is the machine healthy this week?
            const leads7 = fs.leads ?? 0;
            const activated7 = an.activated ?? 0;
            const verdict = activated7 === 0
              ? '🔴 אין הפעלות השבוע — צריך תנועה: פרסום/פוסטים'
              : leads7 === 0
              ? '🟡 יש שימוש אבל אפס בקשות שדרוג — לבדוק את הפייוול/הצעת הערך'
              : `🟢 המשפך חי: ${activated7} הפעלות → ${leads7} לידים (${pct(leads7, activated7)})`;

            // Build the body from joined lines — a raw multiline template literal
            // dropped to column 1 and broke the YAML block scalar (every push
            // produced a zero-job "failure" run because the file didn't parse).
            const body = [
              `## 📊 דוח יומי — ${dateStr} בשעה ${timeStr}`,
              '',
              `### 🎯 שורה תחתונה`,
              verdict,
              '',
              '### משפך — 7 ימים',
              '| שלב | כמות |',
              '|---|---|',
              `| מבקרים | ${an.visitors ?? '—'} |`,
              `| נרשמו | ${an.signups ?? '—'} (${pct(an.signups ?? 0, an.visitors ?? 0)}) |`,
              `| יצרו חוברת | ${an.activated ?? '—'} (${pct(an.activated ?? 0, an.signups ?? 0)}) |`,
              `| פתחו מסך שדרוג | ${fs.upgradeOpened ?? '—'} |`,
              `| לחצו על תשלום | ${fs.ctaClicked ?? '—'} |`,
              `| השאירו ליד | ${fs.leads ?? '—'} |`,
              '',
              '### מקורות תנועה — 7 ימים',
              '| מקור | מבקרים |',
              '|---|---|',
              sourceLines,
              '',
              '### משתמשים',
              '| מדד | ערך |',
              '|---|---|',
              `| סה"כ משתמשים | **${s.totalUsers ?? '—'}** |`,
              `| חדשים היום | **${s.usersToday ?? '—'}** |`,
              `| חדשים השבוע | ${s.usersThisWeek ?? '—'} |`,
              `| 😴 רדומים (4+ ימים ללא פעולה) | ${s.dormantCount ?? '—'} |`,
              `| ⚠️ סיכון נטישה (0 חוברות, 3+ ימים) | ${s.churnRiskCount ?? '—'} |`,
              '',
              '### חוברות',
              '| מדד | ערך |',
              '|---|---|',
              `| סה"כ | **${s.totalBooklets ?? '—'}** |`,
              `| היום | **${s.bookletsToday ?? '—'}** |`,
              `| השבוע | ${s.bookletsThisWeek ?? '—'} |`,
              `| החודש | ${s.bookletsThisMonth ?? '—'} |`,
              '',
              '### פילוח תוכניות',
              '| תוכנית | משתמשים |',
              '|---|---|',
              planLines || '_אין נתונים_',
              '',
              '### 5 הנושאים הפופולריים',
              topicLines || '_אין נתונים_',
              '',
              '### פידבק אחרון',
              feedbackLines,
              '',
              '### לידים אחרונים',
              leadLines,
              '',
              '---',
              '_נוצר אוטומטית על ידי GitHub Actions · [admin panel](https://beshvili.com)_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 דוח יומי — ${dateStr} | ${s.usersToday ?? 0} משתמשים חדשים · ${s.bookletsToday ?? 0} חוברות`,
              body,
              labels: ['daily-report'],
            });
