name: Fix Auth URL + Email Template

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Update Supabase auth config
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          TEMPLATE='<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><style>*{box-sizing:border-box}body{margin:0;padding:0;background:#F7F6FB;font-family:Arial,sans-serif}a{text-decoration:none}</style></head><body><table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:40px 20px"><table width="520" cellpadding="0" cellspacing="0" style="max-width:520px"><tr><td align="center" style="padding:32px 0 24px"><div style="font-size:56px">&#128218;</div><h1 style="font-size:32px;font-weight:800;color:#20184A;margin:8px 0 4px">&#1489;&#1513;&#1489;&#1497;&#1500;&#1497;</h1><p style="font-size:15px;color:#6C5CE7;margin:0">&#1497;&#1493;&#1510;&#1512; &#1495;&#1493;&#1489;&#1512;&#1493;&#1514; &#1500;&#1497;&#1502;&#1493;&#1491; &#1488;&#1497;&#1513;&#1497;&#1493;&#1514; &#1506;&#1501; AI</p></td></tr><tr><td style="background:#ffffff;border-radius:20px;padding:44px 40px;text-align:center;box-shadow:0 8px 32px rgba(108,92,231,0.13)"><div style="font-size:44px;margin-bottom:12px">&#10024;</div><h2 style="font-size:24px;font-weight:800;color:#20184A;margin:0 0 14px">&#1492;&#1499;&#1504;&#1497;&#1505;&#1492; &#1513;&#1500;&#1498; &#1502;&#1495;&#1499;&#1492;!</h2><p style="font-size:16px;color:#555555;line-height:1.75;margin:0 0 36px">&#1500;&#1495;&#1509; &#1506;&#1500; &#1492;&#1499;&#1508;&#1514;&#1493;&#1512; &#1499;&#1491;&#1497; &#1500;&#1492;&#1497;&#1499;&#1504;&#1505; &#1500;&#1489;&#1513;&#1489;&#1497;&#1500;&#1497;<br>&#1493;&#1500;&#1492;&#1514;&#1495;&#1497;&#1500; &#1500;&#1497;&#1510;&#1493;&#1512; &#1495;&#1493;&#1489;&#1512;&#1493;&#1514; &#1500;&#1497;&#1502;&#1493;&#1491; &#1502;&#1493;&#1514;&#1488;&#1502;&#1493;&#1514; &#1488;&#1497;&#1513;&#1497;&#1514; &#1500;&#1497;&#1500;&#1491;&#1498;</p><a href="{{ .ConfirmationURL }}" style="display:inline-block;background:linear-gradient(135deg,#6C5CE7 0%,#F4A02C 100%);color:#ffffff;padding:18px 56px;border-radius:14px;font-size:19px;font-weight:700;letter-spacing:0.3px">&#128640; &#1499;&#1504;&#1497;&#1505;&#1492; &#1500;&#1489;&#1513;&#1489;&#1497;&#1500;&#1497;</a><p style="font-size:13px;color:#bbbbbb;margin:28px 0 0">&#1492;&#1511;&#1497;&#1513;&#1493;&#1512; &#1514;&#1511;&#1507; &#1500; 24 &#1513;&#1506;&#1493;&#1514; &nbsp;&#8226;&nbsp; &#1500;&#1488; &#1489;&#1497;&#1511;&#1513;&#1514;? &#1492;&#1514;&#1506;&#1500;&#1501; &#1502;&#1492;&#1502;&#1497;&#1497;&#1500;</p></td></tr><tr><td align="center" style="padding:24px 0;font-size:12px;color:#aaaaaa">&#1489;&#1513;&#1489;&#1497;&#1500;&#1497; &middot; &#1497;&#1493;&#1510;&#1512; &#1495;&#1493;&#1489;&#1512;&#1493;&#1514; &#1500;&#1497;&#1502;&#1493;&#1491; AI &middot; &#1499;&#1500; &#1492;&#1494;&#1499;&#1493;&#1497;&#1493;&#1514; &#1513;&#1502;&#1493;&#1512;&#1493;&#1514;</td></tr></table></td></tr></table></body></html>'

          jq -n \
            --arg site_url "https://printa4-eight.vercel.app" \
            --arg uri_allow_list "https://printa4-eight.vercel.app/**" \
            --arg subject "✨ הכניסה שלך לבשבילי מחכה" \
            --arg template "$TEMPLATE" \
            '{
              site_url: $site_url,
              uri_allow_list: $uri_allow_list,
              mailer_subjects_magic_link: $subject,
              mailer_templates_magic_link_content: $template
            }' > /tmp/auth_config.json

          echo "Sending config to Supabase..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/gywpdzkvkdisonuzhsib/config/auth" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/auth_config.json)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to update auth config"
            exit 1
          fi
          
          echo "✅ Auth config updated successfully!"
