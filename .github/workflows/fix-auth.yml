name: Fix Auth Redirect URL

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Update Supabase site_url and redirect allowlist
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          jq -n \
            --arg site_url "https://printa4-eight.vercel.app" \
            --arg uri_allow_list "https://printa4-eight.vercel.app/**" \
            '{
              site_url: $site_url,
              uri_allow_list: $uri_allow_list
            }' > /tmp/auth_config.json

          echo "Sending config to Supabase..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/gywpdzkvkdisonuzhsib/config/auth" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/auth_config.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to update auth config"
            exit 1
          fi

          echo "✅ site_url updated to https://printa4-eight.vercel.app"
