name: Keep Render Alive

# DISABLED: the legacy Flask prototype on Render (printa4.onrender.com) is no
# longer deployed — the ping failed every 10 minutes (connection refused) and
# only burned Actions minutes. The active product runs on Vercel + Supabase.
# Manual trigger kept in case the Render service is ever revived.
on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping printa4 server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://printa4.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Server returned $STATUS (may be waking up)"
          else
            echo "✅ Server is alive"
          fi
