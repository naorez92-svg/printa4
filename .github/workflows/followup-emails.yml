name: Follow-up Emails

on:
  schedule:
    # Every 2 days at 08:00 Israel time (06:00 UTC, summer / 07:00 UTC winter)
    - cron: '0 6 */2 * *'
  workflow_dispatch:  # manual trigger from GitHub Actions UI

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-followup-emails Edge Function
        run: |
          response=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://gywpdzkvkdisonuzhsib.supabase.co/functions/v1/send-followup-emails")

          echo "HTTP $response"
          cat /tmp/body.json

          if [ "$response" != "200" ]; then
            echo "::error::Edge Function returned HTTP $response"
            exit 1
          fi
